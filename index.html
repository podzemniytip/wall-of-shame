<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wall of Shame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #c0c0c0;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 1rem;
    }
    .loader {
      width: 32px; height: 32px;
      border: 2px solid #8b0000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #8b0000; }
  </style>
  <meta http-equiv="refresh" content="0;url=https://cdn.jsdelivr.net/gh/podzemniytip/wall-of-shame@gh-pages/index.html">
</head>
<body>
  <div class="loader"></div>
  <p>Loading Wall of Shame...</p>
  <p><a href="https://cdn.jsdelivr.net/gh/podzemniytip/wall-of-shame@gh-pages/index.html">Click here if not redirected</a></p>
</body>
</html>
