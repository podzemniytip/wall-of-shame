<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wall of Shame</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --red: #dc2626;
  --red-glow: rgba(220, 38, 38, 0.25);
  --gold: #f59e0b;
  --gold-glow: rgba(245, 158, 11, 0.25);
  --text: #e5e5e5;
  --text-dim: #6b7280;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(220,38,38,0.03) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.02) 0%, transparent 50%);
}
h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.06em; }
code, .mono { font-family: 'JetBrains Mono', monospace; }
.glow-red { box-shadow: 0 0 20px var(--red-glow); }
.glow-gold { box-shadow: 0 0 20px var(--gold-glow); }
.glow-red:hover { box-shadow: 0 0 35px var(--red-glow); }
.glow-gold:hover { box-shadow: 0 0 35px var(--gold-glow); }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: border-color 0.2s;
}
.card:hover { border-color: rgba(220,38,38,0.3); }
.line-clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  padding: 14px 24px; border-radius: 10px; font-size: 14px;
  max-width: 420px; transform: translateY(120%); opacity: 0;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  border: 1px solid;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: #0f2e1a; border-color: #22c55e; color: #86efac; }
.toast.error { background: #2e0f0f; border-color: #ef4444; color: #fca5a5; }
.toast.info { background: #0f1b2e; border-color: #3b82f6; color: #93c5fd; }
.msg-enter { animation: msgFade 0.3s ease-out both; }
@keyframes msgFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.countdown-pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.btn { border-radius: 8px; font-weight: 600; transition: all 0.2s; cursor: pointer; border: none; font-family: inherit; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="max-w-2xl mx-auto px-4 py-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-5xl tracking-wider" style="color: var(--red); text-shadow: 0 0 30px rgba(220,38,38,0.3);">WALL OF SHAME</h1>
      <p class="text-xs tracking-widest uppercase mt-1" style="color: var(--text-dim);">a place for fools and their fees</p>
    </div>
    <button id="connectBtn" class="btn px-5 py-2.5 text-sm" style="background: var(--red); color: #fff;" onclick="connectWallet()">
      Connect Wallet
    </button>
  </div>

  <!-- Current Message -->
  <div class="card p-6 mb-5">
    <div class="flex items-center gap-2 mb-4">
      <span class="w-2.5 h-2.5 rounded-full" style="background: var(--red); box-shadow: 0 0 8px var(--red-glow);"></span>
      <h2 class="text-xl tracking-widest" style="color: var(--red);">Current Message</h2>
    </div>

    <div id="noMessage" class="text-center py-8">
      <p class="text-lg" style="color: var(--text-dim);">No messages yet. Be the first fool.</p>
    </div>

    <div id="messageDisplay" class="hidden">
      <div class="flex items-start gap-4">
        <div class="flex-1 min-w-0">
          <p id="msgText" class="text-xl font-semibold leading-tight mb-3 line-clamp" style="color: var(--text);"></p>
          <div class="flex flex-wrap gap-x-6 gap-y-1.5 text-sm mono">
            <span style="color: var(--text-dim);">by <span id="msgAuthor" style="color: var(--red);"></span></span>
            <span style="color: var(--text-dim);">posted <span id="msgTimeAgo"></span></span>
          </div>
        </div>
      </div>
      <div class="mt-4 pt-4 flex items-center justify-between flex-wrap gap-3" style="border-top: 1px solid var(--border);">
        <div>
          <span class="text-xs uppercase tracking-widest" style="color: var(--text-dim);">reward pool</span>
          <p id="rewardPoolDisplay" class="text-lg font-bold" style="color: var(--gold); text-shadow: 0 0 20px var(--gold-glow);">0 ETH</p>
        </div>
        <button id="claimBtn" class="btn px-5 py-2.5 text-sm hidden" style="background: var(--gold); color: #000;" onclick="claimReward()">
          Claim Reward
        </button>
        <div id="countdownDisplay" class="text-xs mono" style="color: var(--text-dim);"></div>
      </div>
    </div>
  </div>

  <!-- Post Message -->
  <div class="card p-6 mb-5">
    <div class="flex items-center gap-2 mb-4">
      <span class="w-2.5 h-2.5 rounded-full" style="background: var(--gold); box-shadow: 0 0 8px var(--gold-glow);"></span>
      <h2 class="text-xl tracking-widest" style="color: var(--gold);">Post Your Shame</h2>
    </div>

    <div class="flex gap-3">
      <div class="flex-1 relative">
        <input id="messageInput" type="text" maxlength="32" placeholder="Enter your message..." 
               class="w-full px-4 py-3 rounded-lg text-sm mono"
               style="background: var(--surface2); border: 1px solid var(--border); color: var(--text); outline: none;"
               oninput="updateCharCount()" onkeydown="if(event.key==='Enter') postMessage()">
        <span id="charCount" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs mono" style="color: var(--text-dim);">0/32</span>
      </div>
    </div>

    <button id="postBtn" class="btn w-full mt-3 px-5 py-3 text-sm uppercase tracking-widest" style="background: var(--red); color: #fff;" onclick="postMessage()">
      Post for <span id="postFeeDisplay">...</span> ETH
    </button>
  </div>

  <!-- Recent Messages -->
  <div class="card p-6">
    <div class="flex items-center gap-2 mb-4">
      <span class="w-2.5 h-2.5 rounded-full" style="background: #6b7280;"></span>
      <h2 class="text-xl tracking-widest" style="color: var(--text-dim);">Recent Messages</h2>
    </div>
    <div id="recentMessages">
      <p class="text-sm" style="color: var(--text-dim);">Connect wallet to load history.</p>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const CONTRACT_ADDRESS = "0xEeD4E802912e1D7eB6CE51409f9c99D20F82Ed6a";
const BASE_CHAIN_ID = "0x2105";
const BASE_RPC = "https://mainnet.base.org";

const ABI = [
  "function postMessage(string memory message) payable",
  "function claimReward()",
  "function getCurrentMessage() view returns (address, string memory, uint256, uint256, uint256)",
  "function postFee() view returns (uint256)",
  "function rewardPool() view returns (uint256)",
  "function currentAuthor() view returns (address)",
  "function currentMessage() view returns (string memory)",
  "function lastMessageTime() view returns (uint256)",
  "function rewardDelay() view returns (uint256)",
  "event MessagePosted(address indexed author, string message, uint256 timestamp, uint256 feePaid)",
  "event RewardClaimed(address indexed author, uint256 amount, uint256 timestamp)"
];

// ─── STATE ─────────────────────────────────────────────────
let provider, signer, contract, signerAddress;
let countdownInterval;

// ─── TOAST ─────────────────────────────────────────────────
function toast(msg, type = "info") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + type + " show";
  clearTimeout(el._hide);
  el._hide = setTimeout(() => el.classList.remove("show"), 4000);
}

// ─── WALLET ────────────────────────────────────────────────
async function connectWallet() {
  if (!window.ethereum) return toast("Install MetaMask to play.", "error");
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const network = await provider.getNetwork();
    if (Number(network.chainId) !== 8453) {
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: BASE_CHAIN_ID }]
        });
      } catch (e) {
        if (e.code === 4902) {
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: BASE_CHAIN_ID,
              chainName: "Base",
              nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
              rpcUrls: [BASE_RPC],
              blockExplorerUrls: ["https://basescan.org"]
            }]
          });
        } else throw e;
      }
      provider = new ethers.BrowserProvider(window.ethereum);
    }
    signer = await provider.getSigner();
    signerAddress = await signer.getAddress();
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    document.getElementById("connectBtn").textContent = shorten(signerAddress);
    document.getElementById("connectBtn").style.opacity = "0.7";
    toast("Wallet connected.", "success");
    await loadCurrentMessage();
    await loadRecentMessages();
  } catch (e) {
    if (e.code === 4001) return toast("Connection rejected.", "error");
    toast(e.message || "Connection failed.", "error");
  }
}

// ─── SHORTEN ───────────────────────────────────────────────
function shorten(addr) {
  if (!addr) return "";
  return addr.slice(0, 6) + "..." + addr.slice(-4);
}

// ─── FORMAT TIME ──────────────────────────────────────────
function timeAgo(ts) {
  const diff = Math.floor(Date.now() / 1000) - Number(ts);
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h " + Math.floor((diff % 3600) / 60) + "m ago";
  return Math.floor(diff / 86400) + "d ago";
}

function formatDuration(secs) {
  if (secs <= 0) return "Ready to claim!";
  const d = Math.floor(secs / 86400);
  const h = Math.floor((secs % 86400) / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  let str = "";
  if (d > 0) str += d + "d ";
  str += String(h).padStart(2, "0") + ":";
  str += String(m).padStart(2, "0") + ":";
  str += String(s).padStart(2, "0");
  return str;
}

// ─── LOAD MESSAGE ─────────────────────────────────────────
async function loadCurrentMessage() {
  if (!contract) return;
  try {
    const [author, message, timestamp, pool, fee] = await contract.getCurrentMessage();
    const postFee = await contract.postFee();

    document.getElementById("postFeeDisplay").textContent = ethers.formatEther(postFee);

    if (author === ethers.ZeroAddress || !message) {
      document.getElementById("noMessage").classList.remove("hidden");
      document.getElementById("messageDisplay").classList.add("hidden");
      return;
    }

    document.getElementById("noMessage").classList.add("hidden");
    document.getElementById("messageDisplay").classList.remove("hidden");

    document.getElementById("msgText").textContent = '"' + message + '"';
    document.getElementById("msgAuthor").textContent = shorten(author);
    document.getElementById("rewardPoolDisplay").textContent = ethers.formatEther(pool) + " ETH";

    const now = Math.floor(Date.now() / 1000);
    document.getElementById("msgTimeAgo").textContent = timeAgo(timestamp);

    const delay = Number(await contract.rewardDelay());
    const isAuthor = signerAddress && signerAddress.toLowerCase() === author.toLowerCase();

    const claimBtn = document.getElementById("claimBtn");
    const cdDisplay = document.getElementById("countdownDisplay");

    if (countdownInterval) clearInterval(countdownInterval);

    function updateCountdown() {
      const now2 = Math.floor(Date.now() / 1000);
      const remaining2 = Number(timestamp) + delay - now2;
      const elapsed2 = now2 - Number(timestamp);
      document.getElementById("msgTimeAgo").textContent = timeAgo(timestamp);

      if (remaining2 <= 0) {
        cdDisplay.textContent = "Reward available!";
        cdDisplay.style.color = "var(--gold)";
        if (isAuthor) {
          claimBtn.classList.remove("hidden");
        } else {
          claimBtn.classList.add("hidden");
        }
      } else {
        cdDisplay.textContent = formatDuration(Math.max(0, remaining2));
        cdDisplay.style.color = "var(--text-dim)";
        claimBtn.classList.add("hidden");
      }
    }

    updateCountdown();
    countdownInterval = setInterval(updateCountdown, 1000);

  } catch (e) {
    console.error(e);
  }
}

// ─── POST MESSAGE ─────────────────────────────────────────
async function postMessage() {
  if (!contract) return toast("Connect wallet first.", "error");
  const input = document.getElementById("messageInput");
  const msg = input.value.trim();
  if (!msg) return toast("Message cannot be empty.", "error");
  if (msg.length > 32) return toast("Message too long (max 32 chars).", "error");

  const btn = document.getElementById("postBtn");
  btn.disabled = true;
  btn.textContent = "Posting...";

  try {
    const fee = await contract.postFee();
    const tx = await contract.postMessage(msg, { value: fee });
    toast("Transaction submitted. Waiting for confirmation...", "info");
    await tx.wait();
    toast("Message posted! You are now the current fool.", "success");
    input.value = "";
    updateCharCount();
    await loadCurrentMessage();
    await loadRecentMessages();
  } catch (e) {
    if (e.code === 4001) toast("Transaction rejected.", "error");
    else toast(e.message || "Post failed.", "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Post for " + document.getElementById("postFeeDisplay").textContent + " ETH";
  }
}

// ─── CLAIM REWARD ─────────────────────────────────────────
async function claimReward() {
  if (!contract) return toast("Connect wallet first.", "error");
  const btn = document.getElementById("claimBtn");
  btn.disabled = true;
  btn.textContent = "Claiming...";

  try {
    const tx = await contract.claimReward();
    toast("Claim submitted. Waiting for confirmation...", "info");
    await tx.wait();
    toast("Reward claimed! You are the last hero.", "success");
    await loadCurrentMessage();
  } catch (e) {
    if (e.code === 4001) toast("Transaction rejected.", "error");
    else toast(e.message || "Claim failed.", "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Claim Reward";
  }
}

// ─── RECENT MESSAGES ──────────────────────────────────────
async function loadRecentMessages() {
  if (!contract) return;
  try {
    const filter = contract.filters.MessagePosted();
    const events = await contract.queryFilter(filter, -5000, "latest");
    const recent = events.slice(-20).reverse();

    const container = document.getElementById("recentMessages");
    if (recent.length === 0) {
      container.innerHTML = '<p class="text-sm" style="color: var(--text-dim);">No messages yet.</p>';
      return;
    }

    container.innerHTML = recent.map((e, i) => {
      const { author, message, timestamp, feePaid } = e.args;
      return `<div class="msg-enter flex items-center justify-between py-2.5 ${i > 0 ? '' : ''}" style="${i > 0 ? 'border-top: 1px solid var(--border);' : ''}">
        <div class="flex-1 min-w-0 mr-4">
          <span class="mono text-xs" style="color: var(--red);">${shorten(author)}</span>
          <span class="text-sm ml-2" style="color: var(--text);">${message}</span>
        </div>
        <span class="mono text-xs whitespace-nowrap" style="color: var(--text-dim);">${timeAgo(timestamp)}</span>
      </div>`;
    }).join("");
  } catch (e) {
    console.error(e);
  }
}

// ─── CHAR COUNT ───────────────────────────────────────────
function updateCharCount() {
  const el = document.getElementById("messageInput");
  const count = el.value.length;
  const display = document.getElementById("charCount");
  display.textContent = count + "/32";
  display.style.color = count > 28 ? "var(--red)" : count > 24 ? "var(--gold)" : "var(--text-dim)";
}

// ─── AUTO-CONNECT ─────────────────────────────────────────
window.addEventListener("load", async () => {
  if (window.ethereum) {
    const accounts = await window.ethereum.request({ method: "eth_accounts" });
    if (accounts.length > 0) {
      await connectWallet();
    }
  }
  window.ethereum?.on("accountsChanged", () => { location.reload(); });
  window.ethereum?.on("chainChanged", () => { location.reload(); });
});
</script>
</body>
</html>
